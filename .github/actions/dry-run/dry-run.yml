name: Dry-run
description: Runs checks and dry-runs deploying the production version of the app.

runs:
  using: "composite"

  steps:
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        cache: true

    - name: ⚡️ Setup Supabase
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: 🧊 Install Task
      uses: arduino/setup-task@v2

    - name: 🕵️ Run checks
      shell: bash
      run: task ci SUPABASE_PROJECT_URL=${{ env.SUPABASE_PROJECT_URL }} SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }}

    - name: 🗃️ Push database changes (dry run)
      shell: bash
      run: task db:push SUPABASE_PROJECT_ID=${{ env.SUPABASE_PROJECT_ID }} DRY_RUN=true