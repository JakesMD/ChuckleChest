name: Release
description: Deploys the production version of the app.

runs:
  using: "composite"

  steps:
    - name: 🔧 Setup GitHub Pages
      uses: actions/configure-pages@v5

    - name: 🗑️ Delete existing github-pages artifact
      shell: bash
      continue-on-error: true
      run: |
        ARTIFACT_ID=$(gh api /repos/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}/artifacts \
          --jq '.artifacts[] | select(.name == "github-pages") | .id')
        if [ -n "$ARTIFACT_ID" ]; then
          gh api --method DELETE /repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID
        fi
      env:
        GH_TOKEN: ${{ env.GIT_TOKEN }}

    - name: 📤 Upload production app
      uses: actions/upload-pages-artifact@v3
      with:
        path: "./website/public"

    - name: 🗃️ Push database changes
      shell: bash
      run: hobnob db:push SUPABASE_PROJECT_ID=${{ env.SUPABASE_PROJECT_ID }} DRY_RUN=false

    - name: 🚀 Deploy production website and app
      id: deployment
      uses: actions/deploy-pages@v4