name: on_merge_to_main

on:
    pull_request:
        types:
            - closed
        branches:
            - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        permissions: write-all
        if: github.event.pull_request.merged == true

        env:
            SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
            SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
            SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
            SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
            SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
            GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            RUN_ID: ${{ github.run_id }}
            SHA: ${{ github.sha }}

        steps:
            - name: 📚 Git checkout
              uses: actions/checkout@v4

            - name: 🔖 Detect version bump type from labels
              id: bump_type
              shell: bash
              run: |
                  LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
                  if echo "$LABELS" | grep -q '"hotfix"'; then
                      echo "type=patch" >> "$GITHUB_OUTPUT"
                  elif echo "$LABELS" | grep -q '"release"'; then
                      echo "type=minor" >> "$GITHUB_OUTPUT"
                  else
                      echo "type=none" >> "$GITHUB_OUTPUT"
                  fi

            - name: ⬆️ Bump app version
              id: version
              if: steps.bump_type.outputs.type != 'none'
              run: |
                  NEW_VERSION=$(task version:bump TYPE=${{ steps.bump_type.outputs.type }})
                  echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

            - name: 🚀 Release
              uses: ./.github/actions/release

            - name: 💾 Commit version bump
              if: steps.bump_type.outputs.type != 'none'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add app/pubspec.yaml app/web/index.html
                  git commit -m "Bump app version to ${{ steps.version.outputs.NEW_VERSION }}"
                  git push

            - name: 🌿 Recreate develop branch
              if: steps.bump_type.outputs.type == 'minor'
              run: |
                  git checkout -B develop
                  git push origin develop --force
