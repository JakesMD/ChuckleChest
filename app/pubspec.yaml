name: chuckle_chest
description: A free and open-source app for preserving memories that were not caught on camera.
publish_to: "none"
version: 0.25.0

environment:
  sdk: ^3.11.0
  
resolution: workspace

dependencies:
  auto_route: ^11.1.0
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  bobs_jobs: any
  cauth_client:
  cauth_repository:
  cchest_repository:
  ccore:
  cdatabase_client:
  cgem_repository:
  cperson_repository:
  cplatform_client:
  cplatform_repository:
  crop_your_image: ^2.0.0
  cstorage_client:
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_localizations:
    sdk: flutter
  formz: ^0.8.0
  hydrated_bloc: ^11.0.0
  mallard: any
  mallard_bloc: any
  meta: ^1.15.0
  pinput: ^6.0.2
  signed_spacing_flex: ^1.1.0
  supabase_flutter: ^2.15.0
  talker_bloc_logger: ^5.1.17
  talker_flutter: ^5.1.17
  transparent_image: ^2.0.1
  url_launcher: ^6.3.0

dev_dependencies:
  auto_route_generator: ^10.2.3
  build_runner: ^2.4.10
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  test_beautifier: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: ReadexPro
      fonts:
        - asset: fonts/ReadexPro-VariableFont_HEXP,wght.ttf
